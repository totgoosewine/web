<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Винная карта - Тот Ещё Гусь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1810 50%, #1a0a0a 100%);
            transition: background 0.5s ease;
        }
        
        .wine-card {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(31, 26, 26, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .wine-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            display: block;
            margin: 0 auto 25px;
            border-radius: 12px;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .badge {
            color: #f5e6e6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .wine-title {
            font-size: 26px;
            font-weight: 700;
            color: #f5e6e6;
            margin-bottom: 6px;
            text-align: center;
            line-height: 1.2;
        }
        
        .wine-brand {
            font-size: 18px;
            font-weight: 600;
            color: #e8d4d4;
            margin-bottom: 4px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .wine-origin {
            font-size: 15px;
            color: #c8b4b4;
            margin-bottom: 4px;
            text-align: center;
        }
        
        .vintage-year {
            font-size: 17px;
            font-weight: 700;
            color: #d8c4c4;
            margin-bottom: 22px;
            text-align: center;
        }
        
        .section { 
            margin-bottom: 22px;
            background: rgba(42, 34, 34, 0.6);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: #f5e6e6;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .section-text {
            font-size: 15px;
            line-height: 1.6;
            color: #e8d4d4;
        }
        
        .spec-item {
            margin-bottom: 7px;
            font-size: 15px;
            color: #e8d4d4;
            display: flex;
            gap: 8px;
        }
        
        .spec-label {
            font-weight: 600;
            color: #f5e6e6;
            min-width: 100px;
        }
        
        .tasting-grid { display: grid; gap: 10px; }
        
        .tasting-item {
            background: rgba(42, 34, 34, 0.6);
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            color: #e8d4d4;
            border-left: 3px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tasting-item:hover { 
            transform: translateX(3px);
            background: rgba(48, 40, 40, 0.7);
        }
        
        .tasting-label {
            font-weight: 700;
            color: #f5e6e6;
            margin-right: 6px;
        }
        
        .price-box {
            color: #f5e6e6;
            padding: 18px;
            border-radius: 14px;
            text-align: center;
            margin: 22px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .price-label {
            font-size: 15px;
            margin-bottom: 6px;
            opacity: 0.95;
            font-weight: 500;
        }
        
        .price-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 22px;
        }
        
        .action-button {
            display: block;
            color: #f5e6e6;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.25s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.4);
            opacity: 0.9;
        }
        
        .footer-links {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        
        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #e8d4d4;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            transition: all 0.2s;
            background: rgba(42, 34, 34, 0.6);
        }
        
        .footer-link svg {
            width: 18px;
            height: 18px;
            fill: #e8d4d4;
            transition: fill 0.2s;
        }
        
        .footer-link:hover {
            color: #f5e6e6;
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(48, 40, 40, 0.7);
        }
        
        .footer-link:hover svg {
            fill: #f5e6e6;
        }
        
        .map-container {
            margin-top: 25px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 22px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(42, 34, 34, 0.6);
        }
        
        .map-container iframe {
            width: 100%;
            height: 280px;
            border: none;
            display: block;
            filter: brightness(0.85) contrast(1.1) saturate(0.9);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #e8d4d4;
            font-size: 18px;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="wine-card-container">
        <div class="loading">Загрузка информации о вине...</div>
    </div>
    
    <script>
        const wines = {};
        
        // Загружаем wines.json
        fetch('wines.json')
            .then(response => {
                if (!response.ok) throw new Error('Не удалось загрузить wines.json');
                return response.json();
            })
            .then(data => {
                Object.assign(wines, data);
                renderWine();
            })
            .catch(error => {
                document.getElementById('wine-card-container').innerHTML = `
                    <div class="error">
                        <p>⚠️ Ошибка загрузки данных</p>
                        <p style="font-size: 14px; margin-top: 10px;">${error.message}</p>
                        <p style="font-size: 14px; margin-top: 10px;">Проверьте, что wines.json загружен на GitHub</p>
                    </div>
                `;
                console.error('Error:', error);
            });
        
        function getWineKey() {
            const params = new URLSearchParams(window.location.search);
            return params.get('wine');
        }
        
        function createWineKey(name) {
            return name.toLowerCase()
                .replace(/[^a-zа-яё0-9]/gi, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
        }
        
        function renderWine() {
            const wineKey = getWineKey();
            
            if (!wineKey) {
                document.getElementById('wine-card-container').innerHTML = `
                    <div class="error">
                        <p>⚠️ Не указано название вина</p>
                        <p style="font-size: 14px; margin-top: 10px;">Пример: ?wine=cava-brut-vibracions-cavas-masachs-catalonia-spain-2023</p>
                    </div>
                `;
                return;
            }
            
            // Ищем вино по ключу
            const wine = wines[wineKey];
            
            if (!wine) {
                // Пытаемся найти по частичному совпадению
                const foundWine = Object.entries(wines).find(([key, data]) => 
                    key.includes(wineKey) || createWineKey(data['wine-card-title']).includes(wineKey)
                );
                
                if (foundWine) {
                    renderWineCard(foundWine[1]);
                } else {
                    document.getElementById('wine-card-container').innerHTML = `
                        <div class="error">
                            <p>⚠️ Вино не найдено</p>
                            <p style="font-size: 14px; margin-top: 10px;">Ключ: ${wineKey}</p>
                            <p style="font-size: 14px; margin-top: 10px;">Проверьте название в URL</p>
                        </div>
                    `;
                }
                return;
            }
            
            renderWineCard(wine);
        }
        
        function renderWineCard(wine) {
            // === ГЛАВНОЕ ИСПРАВЛЕНИЕ ===
            // Применяем градиент из Excel к BODY (фону страницы)
            const gradient = wine['style-background-linear-gradient-set'] || 
                           '135deg, #1a0a0a 0%, #2d1810 50%, #1a0a0a 100%';
            
            document.body.style.background = `linear-gradient(${gradient})`;
            
            // Получаем подкатегорию для акцентных элементов
            const subcategory = wine['badge-secondary-subcategory'] || 'RED';
            
            // Изображение
            const imageUrl = wine['product-image-link'] || 
                           'https://totgoosewine.github.io/wine/wine-placeholder.png';
            const imageAlt = wine['alt-for-image-link'] || wine['wine-card-title'];
            
            // Дегустационные заметки (поддержка обоих форматов колонок)
            const color = wine['tasting-item-color'] || wine['ЦВЕТ'] || '—';
            const aroma = wine['tasting-item-aroma'] || wine['АРОМАТ'] || '—';
            const taste = wine['tasting-item-taste'] || wine['ВКУС'] || '—';
            const pairing = wine['tasting-item-pairing'] || wine['ГАСТРОНОМИЯ'] || '—';
            
            // Формируем HTML
            const html = `
                <div class="wine-card">
                    <img src="${imageUrl}" alt="${imageAlt}" class="wine-image">
                    
                    <div class="badges">
                        <span class="badge" style="background: ${gradient}">${wine['vintage-badge-year'] || 'NV'}</span>
                        <span class="badge" style="background: ${gradient}">${wine['badge-primary-type'] || ''}</span>
                        <span class="badge" style="background: ${gradient}">${wine['badge-secondary-category'] || ''}</span>
                        <span class="badge" style="background: ${gradient}">${subcategory}</span>
                    </div>
                    
                    <h1 class="wine-title">${wine['wine-card-title'] || wine['product-title-name'] || 'Wine'}</h1>
                    <h2 class="wine-brand">${wine['product-brand-name'] || ''}</h2>
                    <p class="wine-origin">${wine['product-origin-name'] || ''}</p>
                    <p class="vintage-year">${wine['vintage-badge-year'] || ''}</p>
                    
                    <div class="section">
                        <h3 class="section-title">Описание</h3>
                        <p class="section-text">${wine['description-text-string'] || 'Описание отсутствует'}</p>
                    </div>
                    
                    <div class="section">
                        <h3 class="section-title">Характеристики</h3>
                        <div class="spec-item">
                            <span class="spec-label">Регион:</span>
                            <span>${wine['spec-value-region'] || '—'}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Виноград:</span>
                            <span>${wine['spec-value-grape'] || '—'}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Объем:</span>
                            <span>${wine['spec-value-volume'] || '150ml'}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Крепость:</span>
                            <span>${wine['spec-value-alc'] || '—'}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Стиль:</span>
                            <span>${wine['spec-value-style'] || '—'}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Производитель:</span>
                            <span>${wine['spec-value-winery'] || '—'}</span>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3 class="section-title">Дегустационные заметки</h3>
                        <div class="tasting-grid">
                            <div class="tasting-item">
                                <span class="tasting-label">Цвет:</span>
                                <span>${color}</span>
                            </div>
                            <div class="tasting-item">
                                <span class="tasting-label">Аромат:</span>
                                <span>${aroma}</span>
                            </div>
                            <div class="tasting-item">
                                <span class="tasting-label">Вкус:</span>
                                <span>${taste}</span>
                            </div>
                            <div class="tasting-item">
                                <span class="tasting-label">Гастрономия:</span>
                                <span>${pairing}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="price-box" style="background: ${gradient}">
                        <div class="price-label">Цена за бокал</div>
                        <div class="price-value">${wine['price-value-price'] || '—'}</div>
                    </div>
                    
                    <div class="actions">
                        <a href="https://totgoose.ru" class="action-button" style="background: ${gradient}">Забронировать</a>
                    </div>
                    
                    <div class="footer-links">
                        <a href="https://totgoosewine.github.io/wine/winelist.html" class="footer-link">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 3C9.79 3 8 4.79 8 7C8 9 9 10.5 10 11V14H7V15H17V14H14V11C15 10.5 16 9 16 7C16 4.79 14.21 3 12 3ZM12 5C13.1 5 14 5.9 14 7C14 8.5 13 9.5 12 10C11 9.5 10 8.5 10 7C10 5.9 10.9 5 12 5ZM9 17V19H15V17H9Z"/>
                            </svg>
                            Винная карта
                        </a>
                        <a href="https://yandex.ru/maps/org/tot_yeshchyo_gus/240625638253/" class="footer-link">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                            </svg>
                            Валовая 26
                        </a>
                        <a href="tel:+79999262688" class="footer-link">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                            </svg>
                            +7 (9999) 26-26-88
                        </a>
                        <a href="https://totgoosewine.github.io/wine/menu.html" class="footer-link">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
                            </svg>
                            Меню
                        </a>
                        <a href="https://t.me/totgooserestocafe" class="footer-link">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                            </svg>
                            Telegram
                        </a>
                    </div>
                    
                    <div class="map-container">
                        <iframe src="https://yandex.ru/map-widget/v1/?org_id=240625638253" allowfullscreen="true"></iframe>
                    </div>
                </div>
            `;
            
            document.getElementById('wine-card-container').innerHTML = html;
            document.title = `${wine['wine-card-title'] || 'Wine'} - Тот Ещё Гусь`;
        }
    </script>
</body>
</html>
